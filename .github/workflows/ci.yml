name: ci
on:
    push:
        branches: [main]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                target: [client, server]
        steps:
            - uses: actions/checkout@v4

            - name: Protobuf
              uses: dagger/dagger-for-github@v8.3.0
              with:
                  version: v0.20.5
                  verb: call
                  args: protobuf --source helloworld/ generate directory --path /out export --path helloworld/

            - name: Checks
              uses: dagger/dagger-for-github@v8.3.0
              with:
                  version: v0.20.5
                  verb: check

            - name: Build ${{ matrix.target }}
              uses: dagger/dagger-for-github@v8.3.0
              with:
                  version: v0.20.5
                  verb: call
                  args: build-image --target ${{ matrix.target }} export-image --name ${{ matrix.target }}:latest
